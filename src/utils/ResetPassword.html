<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
}

.container {
  width: 500px;
  height: 500px;
  margin: 0 auto;
  /* border: 1px solid black; */
  position: relative;
  border: 2px solid #f4f3f3;
  margin: 50px auto;
}

.row {
  height: 100px;
  width: 100%;
  background-color: #f4f3f3;
  display: flex;
  align-items: center;
  justify-content: right;
}

.row p {
  font-family: 'Poppins', sans-serif;
  padding: 10px;
}

.andlogo {
  position: relative;
  width: 100%;
  right: 0px;
  margin-top: 20px;
  margin-right: 50px;
}

.andlogo img {
  float: right;
}

.footerrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 85px;
  background-color: black;
}

.contactdetails, .footerlogo {
  margin-top: 20px;
  width: 50%;
}

.etextarea {
  height: 300px;
  background-color: white;
  position: relative;
  width: 500px;
}

.etextarea p {
  padding: 0px 50px 0 50px;
  line-height: 30px;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
}

.footerrow {
  position: absolute;
  top: 420px;
}

.contactdetails p {
  font-family: 'Poppins', sans-serif;
  margin-left: 50px;
  color: white;
  font-weight: bold;
  font-size: 14px;
}

.footerlogo {
  margin-right: 10px;
  margin-right: 30px;
  text-align: right;
  color: white;
  font-family: 'Poppins', sans-serif;
}

.contactdetails p a {
  text-decoration: none;
  color: white;
  font-family: 'Poppins', sans-serif;
}

h3 {
  text-align: center;
  padding: 15px 0 15px 0;
  font-family: 'Poppins', sans-serif;
}

</style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="andlogo">
        <img src="https://stucle-dev.sgp1.cdn.digitaloceanspaces.com/stucle-config/mail/APPSNDEVICES-LOGO.png" alt="">
      </div>
    </div>
    <h3>Reset Password</h3>
    <div class="etextarea">
      <p>
        Hi ${fullName},<br/>
        Greetings from Apps 'N' Devices Technologies Pvt. Ltd!<br/>
        <br/>
        Click the following link to reset your password for ${name}.<br/>
        <a href="${link}"><strong>Reset Password</strong></a>.<br/>
      </p>
      <br/>
      <br/>
      <p>Please Note: the link expires in ${expiry} minutes</p>
    </div> 
    <div class="footerrow">
      <div class="contactdetails"><p><a href="https://appsndevices.com" target="_blank">www.appsndevices.com</a></p></div>
      <div class="footerlogo">
        <img src="https://stucle-dev.sgp1.cdn.digitaloceanspaces.com/stucle-config/mail/AnD-white.png" alt="">
      </div>
    </div>   
  </div>   
</body>
</html>
